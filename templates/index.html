<!DOCTYPE html>
<html>
<head>
    <title>Resume Parser</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">
</head>
<body>

    <div class="main">
        <div class="card">

            <div class="icon">📄</div>

            <h1 class="title">RESUME PARSER</h1>

            <p class="subtitle">
                Upload a PDF resume and we'll extract the key information — 
                name, email, phone, skills, and education.
            </p>

            <form method="POST" enctype="multipart/form-data">
                
                <input type="file" name="resume" required class="file-input">

                <button type="submit" class="btn">Parse Resume 🚀</button>

            </form>

        </div>
    </div>

</body>
</html>
