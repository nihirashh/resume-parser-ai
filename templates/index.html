<!DOCTYPE html>
<html>
<head>
    <title>Resume Parser</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">
</head>
<body>

    <div class="main">

        <div class="card">

            <div class="icon">📄</div>

            <h1 class="title">RESUME PARSER</h1>

            <p class="subtitle">
                Upload a PDF resume and we'll extract the key information — 
                name, email, phone, skills, and education.
            </p>

            <form method="POST" enctype="multipart/form-data">

                <!-- Styled Upload Button -->
                <label class="upload-btn">
                    Upload PDF 📤
                    <input type="file" name="resume" required hidden id="fileInput">
                </label>

                <!-- File name display -->
                <p id="fileName" class="file-name">No file selected</p>

        </div>

                <!-- Parse Button OUTSIDE card -->
                <button type="submit" class="parse-btn">Parse Resume 🚀</button>

            </form>

    </div>

    <!-- JS for showing file name -->
    <script>
        const fileInput = document.getElementById("fileInput");
        const fileName = document.getElementById("fileName");

        fileInput.addEventListener("change", function() {
            fileName.textContent = this.files[0] ? this.files[0].name : "No file selected";
        });
    </script>

</body>
</html>
