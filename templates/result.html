<!DOCTYPE html>
<html>
<head>
    <title>Parsed Resume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='static.css') }}">
</head>
<body>

    <div class="main result-main">

        <div class="card">

            <div class="icon">📊</div>

            <h1 class="title success-title">PARSED RESULT</h1>

            <div class="result-box">
                <p><b>👤 Name:</b> {{ name }}</p>
                <p><b>📧 Email:</b> {{ email }}</p>
                <p><b>📞 Phone:</b> {{ phone }}</p>

                <p><b>🛠 Skills:</b></p>
                <div class="skills">
                    {% for skill in skills %}
                        <span>{{ skill }}</span>
                    {% endfor %}
                </div>

                <p><b>🎓 Education:</b></p>
                <ul>
                    {% for edu in education %}
                        <li>{{ edu }}</li>
                    {% endfor %}
                </ul>
            </div>

        </div>

        <a href="/" class="result-btn">⬅ Upload Another Resume</a>

    </div>

</body>
</html>
